name: Deploy to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 130.211.213.50
          username: chasepdrsn
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            # Install Docker if not installed
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker $USER
              newgrp docker
            fi

            # Install Docker Compose plugin if not installed
            if ! docker compose version &> /dev/null; then
              sudo apt-get install -y docker-compose-plugin
            fi

            # Clone repo if it doesn't exist, otherwise pull latest
            if [ ! -d "/home/chasepdrsn/MusicBot2026" ]; then
              git clone https://github.com/homeybeam/MusicBot2026.git /home/chasepdrsn/MusicBot2026
            else
              cd /home/chasepdrsn/MusicBot2026 && git pull origin main
            fi

            cd /home/chasepdrsn/MusicBot2026/scripts

            # Ensure config folder exists (won't overwrite existing config.txt)
            mkdir -p config

            # Build and restart
            docker build -t jmusicbot25 .
            docker compose down || true
            docker compose up -d
